services:
  backend:
    build: ./server
    container_name: vaulto-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: unless-stopped

  frontend:
    build: ./client
    container_name: vaulto-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped